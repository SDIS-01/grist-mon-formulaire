<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Formulaire Grist</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root {
    --accent: #0066B3;
    --accent-dark: #004C87;
    --bg: #f8fafc;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; gap: 12px; }
  .header-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .header-logo { height: 38px; width: auto; flex-shrink: 0; }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .header-brand h1 { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #gearBtn { display: none; }
  #gearBtn.revealed { display: flex; }
  .header-logo { cursor: pointer; }
  h1 { font-size: 18px; margin: 0; }
  .gear {
    border: 1px solid var(--border);
    background: white;
    border-radius: 8px;
    width: 32px; height: 32px;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .gear:hover { background: #f1f5f9; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .external-links-row { display: flex; gap: 8px; flex-wrap: wrap; margin: -8px 0 16px; }
  .external-link-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    color: var(--text);
  }
  .external-link-btn:hover { background: #f1f5f9; }
  form { display: flex; flex-direction: column; gap: 14px; }
  label { font-size: 13px; font-weight: 600; margin-bottom: 4px; display: block; }
  .req { color: #dc2626; }
  input, select, textarea {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: white;
  }
  input:disabled {
    background: #f1f5f9;
    color: var(--muted);
    cursor: not-allowed;
  }
  select[multiple] { min-height: 100px; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input { width: auto; }
  .formula-hint { font-weight: 400; color: var(--muted); font-size: 12px; }
  .formula-preview {
    width: 100%;
    min-height: 20px;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #f1f5f9;
    color: var(--text);
  }
  .formula-preview-placeholder { color: var(--muted); }
  .formula-preview-list {
    margin: 0;
    padding-left: 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .formula-preview-list li { line-height: 1.4; }
  .attachment-list { display: flex; flex-direction: column; gap: 8px; }
  .attachment-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text);
    text-decoration: none;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    width: fit-content;
    max-width: 100%;
  }
  .attachment-item:hover { background: #f1f5f9; }
  .attachment-item.attachment-image { flex-direction: column; align-items: flex-start; }
  .attachment-item.attachment-image img {
    max-width: 220px; max-height: 160px;
    border-radius: 6px;
    object-fit: cover;
  }
  .attachment-item span { overflow-wrap: anywhere; }
  .field-comment { font-size: 12px; color: var(--muted); margin: -8px 0 6px; line-height: 1.4; }
  .form-section {
    margin: 10px 0 -4px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent);
  }
  .form-section h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-dark);
  }
  .form-section:first-child { margin-top: 0; }
  .field-row-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-items: start;
  }
  .field-row-2col > div { min-width: 0; }
  .form-actions-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
  button.primary {
    margin-top: 8px;
    padding: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button.primary:hover { background: var(--accent-dark); }
  button.primary:disabled { background: #94a3b8; cursor: not-allowed; }
  button.secondary {
    padding: 9px 14px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .msg {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    white-space: pre-wrap;
  }
  .msg.success { display: block; background: #dcfce7; color: #166534; }
  .msg.error { display: block; background: #fee2e2; color: #991b1b; }
  .note { font-size: 12px; color: var(--muted); margin-top: 16px; line-height: 1.5; }
  .empty-state { color: var(--muted); font-size: 14px; padding: 20px 0; text-align: center; }

  /* Config / setup panel */
  #configPanel, #setupPanel { display: none; }
  .cfg-block {
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    margin-bottom: 16px;
  }
  .cfg-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    background: white;
  }
  #cfgList {
    max-height: 60vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-right: 4px;
  }
  .cfg-row input[type="text"] { width: 100%; }
  .cfg-row .order-input { width: 56px; }
  .cfg-actions { display: flex; gap: 10px; margin-top: 16px; }
  .cfg-col-name { font-size: 12px; color: var(--muted); }
  .cfg-comment { margin-top: 6px; font-size: 12px; }
  .cfg-section-row { background: #f0fdf4; border-color: #bbf7d0; }
  .cfg-link-row {
    display: grid;
    grid-template-columns: 1fr 2fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    background: white;
  }
  .cfg-link-row input { font-size: 13px; padding: 7px 9px; }
  .cfg-link-colors { margin-top: 0; }
  .cfg-section-title { font-weight: 600; }
  .cfg-color-picker { display: flex; gap: 6px; margin-top: 8px; }
  .cfg-color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
  }
  .cfg-color-swatch.selected { border-color: #1e293b; box-shadow: 0 0 0 2px white inset; }
  .cfg-filter {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .cfg-filter-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .cfg-filter select { font-size: 12px; padding: 6px 8px; }

  /* Combobox recherche (colonnes Référence) */
  .combo { position: relative; }
  .combo-input { font-size: 16px; } /* évite le zoom auto sur iOS */
  .combo-list {
    display: none;
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 4px;
    max-height: 240px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    z-index: 50;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  }
  .combo-list.open { display: block; }
  .combo-option {
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .combo-option:hover, .combo-option:active { background: #f1f5f9; }
  .combo-empty { padding: 12px; font-size: 13px; color: var(--muted); }
  .combo-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .combo-tag {
    display: flex; align-items: center; gap: 6px;
    background: #ecfdf5; color: #065f46;
    border: 1px solid #a7f3d0;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
  }
  .combo-tag button {
    border: none; background: none; color: #065f46; cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0;
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 480px) {
    body { padding: 14px; }
    .header-logo { height: 30px; }
    .header-brand h1 { font-size: 16px; }
    .gear { width: 30px; height: 30px; font-size: 14px; }
    .cfg-row { grid-template-columns: auto 1fr; }
    .cfg-row .order-input { grid-column: 2; justify-self: start; width: 70px; }
    .field-row-2col { grid-template-columns: 1fr; }
  }

  /* ---------- Impression / PDF ---------- */
  @media print {
    .header-actions, #excludedNote, #cascadeNote, #externalLinks, button.primary, button.secondary,
    #setupPanel, #configPanel { display: none !important; }
    body { padding: 0; background: white; }
    .wrap { max-width: 100%; }
    .header { border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-bottom: 14px; }
    .subtitle { margin-bottom: 16px; }
    input:disabled, .formula-preview { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    form { gap: 10px; }
  }
</style>
</head>

      <h1 id="pageTitle">📋 Formulaire</h1>
    </div>
    <div class="header-actions">
      <button class="gear" id="printBtn" title="Imprimer / Exporter en PDF">🖨️</button>
      <button class="gear" id="gearBtn" title="Configurer les champs">⚙️</button>
    </div>
  </div>
  <div class="subtitle" id="pageSubtitle">Chargement…</div>
  <div id="externalLinks" class="external-links-row"></div>

  <div id="setupPanel">
    <div class="cfg-block">
      <label for="setupTableSelect">Table cible introuvable ou non définie. Choisissez-la :</label>
      <select id="setupTableSelect"></select>
    </div>
    <div class="cfg-actions">
      <button class="primary" id="setupSave">Valider cette table</button>
    </div>
  </div>

  <div id="formView">
    <form id="form"></form>
    <div id="msg" class="msg"></div>
    <div id="cascadeNote" class="note"></div>
    <div id="excludedNote" class="note"></div>
  </div>

  <div id="configPanel">
    <div class="cfg-block">
      <label for="cfgTableSelect">Table cible</label>
      <select id="cfgTableSelect"></select>
      <div style="margin-top:10px;">
        <button type="button" class="secondary" id="cfgRefresh">🔄 Actualiser les colonnes</button>
      </div>
    </div>
    <div class="cfg-block">
      <label for="cfgFormTitle">Titre du formulaire</label>
      <input type="text" id="cfgFormTitle" placeholder="Par défaut : nom de la table" />
      <label for="cfgFormSubtitle" style="margin-top:10px;">Sous-titre / description</label>
      <input type="text" id="cfgFormSubtitle" placeholder="Par défaut : phrase générique avec le nom de la table" />
    </div>
    <div class="cfg-block">
      <label>🔗 Liens externes (facultatif — ex. Kanban, Gantt, autre page)</label>
      <div id="cfgLinksList" style="margin-top:8px;"></div>
      <button type="button" class="secondary" id="cfgAddLink" style="margin-top:8px;">+ Ajouter un lien</button>
    </div>
    <div class="subtitle">Cochez les champs à afficher, renommez-les si besoin, marquez-les obligatoires et fixez leur ordre. Les colonnes formule sont affichées en lecture seule (grisées) dans le formulaire.</div>
    <div style="margin-bottom:10px;">
      <button type="button" class="secondary" id="cfgAddSection">📖 Ajouter un chapitre</button>
    </div>
    <div id="cfgList"></div>
    <div class="cfg-actions">
      <button class="primary" id="cfgSave">Enregistrer</button>
      <button class="secondary" id="cfgCancel">Annuler</button>
    </div>
  </div>

</div>

<script>
  const GUESS_NAME = 'Donnee_Formulaire'; // utilisé seulement pour une détection automatique au premier lancement

  let allTableIds = [];
  let targetTableId = null;
  let allDocColumns = null;   // raw _grist_Tables_column fetch, whole doc
  let tableColumns = [];      // column meta for targetTableId
  let mergedConfig = [];
  let formSections = []; // chapitres : [{ id, title, order }]
  let externalLinksList = []; // liens externes personnalisés : [{ id, label, url }]

  // Charge la liste de liens externes, avec migration automatique depuis les deux
  // anciens champs fixes (kanbanUrl / ganttUrl) si la liste n'existe pas encore.
  function loadExternalLinks() {
    if (Array.isArray(currentOptions.externalLinksList)) {
      return currentOptions.externalLinksList;
    }
    const migrated = [];
    if (currentOptions.kanbanUrl) {
      migrated.push({ id: 'link_kanban_legacy', label: '📊 Voir le Kanban', url: currentOptions.kanbanUrl });
    }
    if (currentOptions.ganttUrl) {
      migrated.push({ id: 'link_gantt_legacy', label: '📅 Voir le Gantt', url: currentOptions.ganttUrl });
    }
    return migrated;
  }
  let refOptionsCache = {};
  let currentOptions = null;
  let comboState = {};        // colId -> option sélectionnée (Ref) ou tableau (RefList)
  let comboOptionsCache = {}; // colId -> options triées disponibles pour le combobox
  let docTablesMeta = null;   // cache de _grist_Tables (toutes les tables du document)
  let dependencyInfo = {};    // colId enfant -> { parentColId, linkColId, targetTable }
  let fieldDependents = {};   // colId parent -> [colId enfant, ...]
  let dependencyCallbacks = {}; // colId enfant -> fonction à appeler quand son parent change
  let formulaPreviewInfo = {}; // colId formule -> { refColId, subColId, targetTable } (détection simple $Ref.SousChamp)
  let formulaCallbacks = {};   // colId formule -> fonction de mise à jour de l'aperçu

  document.addEventListener('click', (e) => {
    document.querySelectorAll('.combo-list.open').forEach(listEl => {
      const wrapper = listEl.closest('.combo');
      if (wrapper && !wrapper.contains(e.target)) listEl.classList.remove('open');
    });
  });

  grist.ready({
    requiredAccess: 'full',
    onEditOptions: () => showConfig(),
  });

  grist.onOptions(async (options) => {
    currentOptions = options || {};
    try {
      await bootstrap();
    } catch (err) {
      console.error(err);
      document.getElementById('form').innerHTML =
        '<div class="empty-state">Erreur : ' + escapeHtml(err.message || String(err)) + '</div>';
    }
  });

  document.getElementById('gearBtn').addEventListener('click', showConfig);
  document.getElementById('printBtn').addEventListener('click', () => window.print());

  // Déclencheur discret : 5 clics rapides sur le logo révèlent la roue crantée
  // de configuration (masquée par défaut pour les utilisateurs publics).
  // Rappel : la vraie protection contre la modification des données reste les
  // Access Rules Grist (Create seule sur la table, structure verrouillée) —
  // ceci n'est qu'une question d'ergonomie, pas de sécurité.
  (function setupGearReveal() {
    const logo = document.querySelector('.header-logo');
    const gear = document.getElementById('gearBtn');
    if (!logo || !gear) return;
    let clicks = 0;
    let resetTimer = null;
    logo.addEventListener('click', () => {
      clicks++;
      clearTimeout(resetTimer);
      resetTimer = setTimeout(() => { clicks = 0; }, 2000);
      if (clicks >= 5) {
        gear.classList.add('revealed');
        clicks = 0;
      }
    });
  })();
  document.getElementById('cfgCancel').addEventListener('click', hideConfig);
  document.getElementById('cfgSave').addEventListener('click', saveConfig);
  document.getElementById('cfgRefresh').addEventListener('click', async () => {
    const btn = document.getElementById('cfgRefresh');
    btn.disabled = true;
    btn.textContent = '⏳ Actualisation…';
    try {
      await loadColumnsFor(targetTableId);
      mergedConfig = mergeConfig(tableColumns, currentOptions.formConfig);
      renderConfigList();
    } catch (err) {
      console.error(err);
      alert('Erreur lors de l’actualisation : ' + (err.message || err));
    } finally {
      btn.disabled = false;
      btn.textContent = '🔄 Actualiser les colonnes';
    }
  });
  document.getElementById('setupSave').addEventListener('click', saveSetup);
  document.getElementById('cfgAddSection').addEventListener('click', addSection);
  document.getElementById('cfgAddLink').addEventListener('click', addExternalLink);

  async function bootstrap() {
    allTableIds = await grist.docApi.listTables();

    const saved = currentOptions.tableId;
    if (saved && allTableIds.includes(saved)) {
      targetTableId = saved;
    } else {
      // tentative de détection automatique (insensible aux accents/casse) au tout premier lancement
      const normalize = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const guess = allTableIds.find(t => normalize(t) === normalize(GUESS_NAME));
      targetTableId = guess || null;
    }

    if (!targetTableId) {
      showSetup();
      return;
    }

    hideSetup();
    await loadColumnsFor(targetTableId);
    mergedConfig = mergeConfig(tableColumns, currentOptions.formConfig);
    formSections = currentOptions.formSections || [];
    externalLinksList = loadExternalLinks();
    updateHeaderText();

    if (document.getElementById('configPanel').style.display !== 'block') {
      await renderForm(mergedConfig);
    }
  }

  // ---------- Setup (première sélection de table) ----------

  function showSetup() {
    document.getElementById('formView').style.display = 'none';
    document.getElementById('configPanel').style.display = 'none';
    document.getElementById('setupPanel').style.display = 'block';
    const sel = document.getElementById('setupTableSelect');
    sel.innerHTML = allTableIds.map(t => `<option value="${t}">${t}</option>`).join('');
  }

  function hideSetup() {
    document.getElementById('setupPanel').style.display = 'none';
    document.getElementById('formView').style.display = 'block';
  }

  async function saveSetup() {
    const chosen = document.getElementById('setupTableSelect').value;
    await grist.setOption('tableId', chosen);
    currentOptions.tableId = chosen;
    targetTableId = chosen;
    hideSetup();
    await loadColumnsFor(targetTableId);
    mergedConfig = mergeConfig(tableColumns, currentOptions.formConfig);
    formSections = currentOptions.formSections || [];
    externalLinksList = loadExternalLinks();
    updateHeaderText();
    await renderForm(mergedConfig);
  }

  // ---------- Chargement des colonnes ----------

  async function loadColumnsFor(tableId) {
    docTablesMeta = await grist.docApi.fetchTable('_grist_Tables');
    const tableIdx = docTablesMeta.tableId.indexOf(tableId);
    if (tableIdx === -1) throw new Error('Table "' + tableId + '" introuvable.');
    const tableRef = docTablesMeta.id[tableIdx];

    allDocColumns = await grist.docApi.fetchTable('_grist_Tables_column');

    const rows = [];
    for (let i = 0; i < allDocColumns.id.length; i++) {
      if (allDocColumns.parentId[i] !== tableRef) continue;
      // Modification : on NE saute plus les colonnes formule, on les marque simplement.
      const colId = allDocColumns.colId[i];
      if (colId === 'manualSort' || colId.startsWith('gristHelper_')) continue;
      rows.push({
        colId,
        label: allDocColumns.label[i] || colId,
        type: allDocColumns.type[i] || 'Text',
        widgetOptions: allDocColumns.widgetOptions[i] || '',
        visibleCol: allDocColumns.visibleCol[i] || 0,
        isFormula: !!allDocColumns.isFormula[i],
        formula: allDocColumns.formula ? (allDocColumns.formula[i] || '') : '',
      });
    }
    tableColumns = rows;
  }

  // Retourne la liste des colId d'une table quelconque du document (utilisé pour la suggestion
  // automatique de filtre lors de la première configuration d'un champ).
  function getColumnIdsForTable(tableId) {
    if (!docTablesMeta || !allDocColumns) return [];
    const idx = docTablesMeta.tableId.indexOf(tableId);
    if (idx === -1) return [];
    const tableRef = docTablesMeta.id[idx];
    const ids = [];
    for (let i = 0; i < allDocColumns.id.length; i++) {
      if (allDocColumns.parentId[i] === tableRef) ids.push(allDocColumns.colId[i]);
    }
    return ids;
  }

  // Retourne {colId, label} de toutes les colonnes d'une table quelconque du document,
  // utilisé pour peupler le sélecteur "colonne de liaison" dans le panneau de configuration.
  function getColumnsMetaForTable(tableId) {
    if (!docTablesMeta || !allDocColumns) return [];
    const idx = docTablesMeta.tableId.indexOf(tableId);
    if (idx === -1) return [];
    const tableRef = docTablesMeta.id[idx];
    const cols = [];
    for (let i = 0; i < allDocColumns.id.length; i++) {
      if (allDocColumns.parentId[i] !== tableRef) continue;
      const colId = allDocColumns.colId[i];
      if (colId === 'manualSort' || colId.startsWith('gristHelper_')) continue;
      cols.push({ colId, label: allDocColumns.label[i] || colId });
    }
    return cols;
  }

  // Construit les dépendances de filtrage en cascade à partir du réglage explicite choisi
  // par l'utilisateur dans le panneau ⚙️ (filterParentColId / filterLinkColId), et non plus
  // par une détection automatique silencieuse.
  function computeDependencies(included) {
    dependencyInfo = {};
    fieldDependents = {};
    for (const col of included) {
      if (col.isFormula) continue;
      if (!(col.type.startsWith('Ref:') || col.type.startsWith('RefList:'))) continue;
      if (!col.filterParentColId || !col.filterLinkColId) continue;
      const parent = included.find(other => other.colId === col.filterParentColId);
      if (!parent) continue; // le champ choisi comme filtre n'est plus affiché dans le formulaire
      const targetTable = col.type.split(':')[1];
      dependencyInfo[col.colId] = { parentColId: parent.colId, linkColId: col.filterLinkColId, targetTable };
      if (!fieldDependents[parent.colId]) fieldDependents[parent.colId] = [];
      fieldDependents[parent.colId].push(col.colId);
    }
  }

  // Détecte, parmi les champs formule affichés, ceux qui sont une simple recopie d'une
  // valeur de la ligne référencée par un champ Référence du formulaire (formule du type
  // "$MonChampReference.SousChamp"). Pour ceux-là uniquement, on peut afficher un aperçu
  // en direct dès que la référence est sélectionnée. Les formules plus complexes
  // (calculs, conditions, agrégats...) ne sont pas reproduites : trop risqué de les
  // interpréter à moitié, le champ reste grisé/vide comme avant.
  function computeFormulaPreviews(included) {
    formulaPreviewInfo = {};
    for (const col of included) {
      if (!col.isFormula || !col.formula) continue;
      const m = col.formula.trim().match(/^\$([A-Za-z_]\w*)\.([A-Za-z_]\w*)$/);
      if (!m) continue; // formule pas au format simple "$Champ.SousChamp" -> pas d'aperçu
      const [, refColId, subColId] = m;
      const refField = included.find(f => f.colId === refColId && (f.type.startsWith('Ref:') || f.type.startsWith('RefList:')));
      if (!refField || refField.type.startsWith('RefList:')) continue; // aperçu géré seulement pour une Référence simple
      formulaPreviewInfo[col.colId] = { refColId, subColId, targetTable: refField.type.split(':')[1] };
      if (!fieldDependents[refColId]) fieldDependents[refColId] = [];
      fieldDependents[refColId].push(col.colId);
    }
  }

  // Valeur brute actuelle d'un champ, quel que soit son type (combo ou saisie libre),
  // utilisée pour comparer au champ de liaison de la table référencée.
  function getFieldRawValue(colId) {
    const field = mergedConfig.find(c => c.colId === colId);
    if (!field) return null;
    const isCombo = field.type.startsWith('Ref:') || field.type.startsWith('RefList:') ||
      field.type === 'Choice' || field.type === 'ChoiceList';
    if (isCombo) {
      const state = comboState[colId];
      if (Array.isArray(state)) return null; // liste multiple : filtrage non géré ici
      return state ? state.value : null;
    }
    const el = document.getElementById('f_' + colId);
    if (!el) return null;
    return el.value === '' ? null : el.value;
  }

  // Prévient tous les champs enfants d'un champ parent que sa valeur vient de changer,
  // pour qu'ils rafraîchissent leurs options (filtres en cascade) ou leur aperçu (formules).
  function notifyDependents(parentColId) {
    (fieldDependents[parentColId] || []).forEach(childColId => {
      if (dependencyCallbacks[childColId]) dependencyCallbacks[childColId]();
      if (formulaCallbacks[childColId]) formulaCallbacks[childColId]();
    });
  }

  // Met à jour le titre/sous-titre affichés : utilise le titre personnalisé s'il est
  // défini (currentOptions.formTitle / formSubtitle), sinon retombe sur le nom de la table.
  function updateHeaderText() {
    const title = (currentOptions.formTitle && currentOptions.formTitle.trim()) || targetTableId;
    const subtitle = (currentOptions.formSubtitle && currentOptions.formSubtitle.trim()) ||
      ('Formulaire de saisie pour la table ' + targetTableId + '.');
    document.getElementById('pageTitle').textContent = '📋 ' + title;
    document.getElementById('pageSubtitle').textContent = subtitle;

    // Boutons de lien externes : un par entrée de la liste, uniquement si une URL est renseignée.
    const linksEl = document.getElementById('externalLinks');
    if (linksEl) {
      linksEl.innerHTML = externalLinksList
        .filter(l => l.url && l.url.trim())
        .map(l => {
          const c = LINK_COLORS[l.color] || LINK_COLORS.neutral;
          return `<a class="external-link-btn" href="${escapeHtml(l.url)}" target="_blank" rel="noopener"
            style="background:${c.bg};color:${c.text};border-color:${c.border};">${escapeHtml(l.label || l.url)}</a>`;
        })
        .join('');
    }
  }

  function mergeConfig(columns, savedConfig) {
    const savedMap = {};
    (savedConfig || []).forEach(c => { savedMap[c.colId] = c; });
    const alphabetical = [...columns].sort((a, b) =>
      a.label.localeCompare(b.label, 'fr', { sensitivity: 'base' })
    );
    return alphabetical.map((col, idx) => {
      const saved = savedMap[col.colId];
      const isRef = col.type.startsWith('Ref:') || col.type.startsWith('RefList:');
      let filterParentColId = saved ? (saved.filterParentColId || null) : null;
      let filterLinkColId = saved ? (saved.filterLinkColId || null) : null;
      if (isRef && !saved) {
        // Suggestion automatique uniquement lors de la toute première configuration :
        // même colId entre la table cible de la référence et un autre champ du formulaire.
        // Reste modifiable/annulable ensuite dans le panneau ⚙️.
        const targetTable = col.type.split(':')[1];
        const targetColIds = getColumnIdsForTable(targetTable);
        const guessParent = columns.find(other => other.colId !== col.colId && targetColIds.includes(other.colId));
        if (guessParent) {
          filterParentColId = guessParent.colId;
          filterLinkColId = guessParent.colId;
        }
      }
      return {
        colId: col.colId,
        type: col.type,
        widgetOptions: col.widgetOptions,
        visibleCol: col.visibleCol,
        isFormula: col.isFormula,
        formula: col.formula || '',
        comment: saved && saved.comment ? saved.comment : '',
        defaultLabel: col.label,
        label: (saved && saved.label) ? saved.label : col.label,
        included: saved ? saved.included !== false : true,
        // Une colonne formule ne peut jamais être "obligatoire" (elle n'est pas saisissable)
        required: col.isFormula ? false : (saved ? !!saved.required : false),
        order: (saved && typeof saved.order === 'number') ? saved.order : idx,
        filterParentColId: isRef ? filterParentColId : null,
        filterLinkColId: isRef ? filterLinkColId : null,
        alignWithNext: saved ? !!saved.alignWithNext : false,
      };
    });
  }

  // ---------- Config panel ----------

  function showConfig() {
    if (!allTableIds.length) return; // pas encore prêt
    document.getElementById('formView').style.display = 'none';
    document.getElementById('setupPanel').style.display = 'none';
    document.getElementById('configPanel').style.display = 'block';

    const sel = document.getElementById('cfgTableSelect');
    sel.innerHTML = allTableIds.map(t => `<option value="${t}" ${t === targetTableId ? 'selected' : ''}>${t}</option>`).join('');

    document.getElementById('cfgFormTitle').value = currentOptions.formTitle || '';
    document.getElementById('cfgFormSubtitle').value = currentOptions.formSubtitle || '';
    renderLinksList();

    renderConfigList();
  }

  function hideConfig() {
    document.getElementById('configPanel').style.display = 'none';
    document.getElementById('formView').style.display = 'block';
  }

  // Palette de couleurs disponible pour les chapitres, reprise du logo SDIS.
  const SECTION_COLORS = [
    { value: '#E30613', label: 'Rouge' },
    { value: '#FDB913', label: 'Or' },
    { value: '#0066B3', label: 'Bleu' },
    { value: '#1B7A3D', label: 'Vert' },
    { value: '#1a1a1a', label: 'Noir' },
  ];

  function renderConfigList() {
    const list = document.getElementById('cfgList');
    const fieldItems = mergedConfig.map(c => ({ kind: 'field', order: c.order, data: c }));
    const sectionItems = formSections.map(s => ({ kind: 'section', order: s.order, data: s }));
    const sorted = [...fieldItems, ...sectionItems].sort((a, b) => a.order - b.order);
    list.innerHTML = sorted.map(item => {
      if (item.kind === 'section') {
        const s = item.data;
        const currentColor = s.color || SECTION_COLORS[3].value;
        const swatches = SECTION_COLORS.map(c => `
          <button type="button" class="cfg-color-swatch${c.value === currentColor ? ' selected' : ''}"
            data-color="${c.value}" title="${c.label}" style="background:${c.value};"></button>
        `).join('');
        return `
      <div class="cfg-row cfg-section-row" data-section="${s.id}" data-chosen-color="${currentColor}">
        <div style="font-size:18px;">📖</div>
        <div>
          <input type="text" class="cfg-section-title" value="${escapeHtml(s.title)}" placeholder="Titre du chapitre" />
          <div class="cfg-col-name">Chapitre</div>
          <div class="cfg-color-picker">${swatches}</div>
        </div>
        <button type="button" class="secondary cfg-section-delete" title="Supprimer ce chapitre" style="padding:6px 10px;">🗑️</button>
        <input type="number" class="cfg-order order-input" value="${s.order}" />
      </div>`;
      }
      const c = item.data;
      const isRef = c.type.startsWith('Ref:') || c.type.startsWith('RefList:');
      const filterBlock = (isRef && !c.isFormula) ? renderFilterBlock(c) : '';
      return `
      <div class="cfg-row" data-col="${c.colId}">
        <input type="checkbox" class="cfg-included" ${c.included ? 'checked' : ''} />
        <div>
          <input type="text" class="cfg-label" value="${escapeHtml(c.label)}" />
          <div class="cfg-col-name">${c.colId} · ${c.type}${c.isFormula ? ' · <strong>formule (lecture seule)</strong>' : ''}</div>
          <input type="text" class="cfg-comment" value="${escapeHtml(c.comment || '')}" placeholder="Commentaire affiché sous ce champ (facultatif)" />
          ${filterBlock}
        </div>
        <label style="display:flex;align-items:center;gap:4px;font-weight:400;font-size:12px;">
          <input type="checkbox" class="cfg-required" ${c.required ? 'checked' : ''} ${c.isFormula ? 'disabled' : ''} /> obligatoire
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-weight:400;font-size:12px;grid-column:1 / -1;">
          <input type="checkbox" class="cfg-align-next" ${c.alignWithNext ? 'checked' : ''} /> ⬌ Aligner avec le champ suivant (deux colonnes)
        </label>
        <input type="number" class="cfg-order order-input" value="${c.order}" />
      </div>
    `;
    }).join('');

    list.querySelectorAll('.cfg-section-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        const row = btn.closest('.cfg-section-row');
        const sectionId = row.dataset.section;
        formSections = formSections.filter(s => s.id !== sectionId);
        renderConfigList();
      });
    });

    list.querySelectorAll('.cfg-section-row').forEach(row => {
      row.querySelectorAll('.cfg-color-swatch').forEach(btn => {
        btn.addEventListener('click', () => {
          row.dataset.chosenColor = btn.dataset.color;
          row.querySelectorAll('.cfg-color-swatch').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
      });
    });
  }

  function addSection() {
    const allOrders = [...mergedConfig.map(c => c.order), ...formSections.map(s => s.order)];
    const maxOrder = allOrders.length ? Math.max(...allOrders) : 0;
    formSections.push({
      id: 'sec_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title: 'Nouveau chapitre',
      order: maxOrder + 1,
      color: SECTION_COLORS[3].value,
    });
    renderConfigList();
  }

  // ---------- Liste de liens externes (⚙️) ----------

  // Palette pastel pour les bulles de lien, dérivée des couleurs du logo (versions claires
  // pour rester lisibles en fond de bouton, avec un texte plus foncé de la même teinte).
  const LINK_COLORS = {
    neutral: { label: 'Neutre',  bg: '#ffffff', text: '#1a1a1a', border: '#e2e5ea' },
    red:     { label: 'Rouge',   bg: '#fde8e8', text: '#b3040f', border: '#f5b8b8' },
    gold:    { label: 'Or',      bg: '#fff4d6', text: '#92650a', border: '#f2dda3' },
    blue:    { label: 'Bleu',    bg: '#e3f0fa', text: '#004c87', border: '#a9d0ec' },
    green:   { label: 'Vert',    bg: '#e6f4ea', text: '#145c2c', border: '#a9dbb8' },
  };

  function renderLinksList() {
    const list = document.getElementById('cfgLinksList');
    if (!list) return;
    list.innerHTML = externalLinksList.map(l => {
      const currentColor = l.color && LINK_COLORS[l.color] ? l.color : 'neutral';
      const swatches = Object.keys(LINK_COLORS).map(key => {
        const c = LINK_COLORS[key];
        return `<button type="button" class="cfg-color-swatch${key === currentColor ? ' selected' : ''}"
          data-color="${key}" title="${c.label}" style="background:${c.bg};border-color:${c.border};"></button>`;
      }).join('');
      return `
      <div class="cfg-link-row" data-link="${l.id}" data-chosen-color="${currentColor}">
        <input type="text" class="cfg-link-label" value="${escapeHtml(l.label)}" placeholder="Libellé (ex. Voir le Kanban)" />
        <input type="text" class="cfg-link-url" value="${escapeHtml(l.url)}" placeholder="https://..." />
        <div class="cfg-color-picker cfg-link-colors">${swatches}</div>
        <button type="button" class="secondary cfg-link-delete" title="Supprimer ce lien">🗑️</button>
      </div>
    `;
    }).join('') || '<div class="cfg-col-name">Aucun lien pour le moment.</div>';

    list.querySelectorAll('.cfg-link-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        const row = btn.closest('.cfg-link-row');
        externalLinksList = externalLinksList.filter(l => l.id !== row.dataset.link);
        renderLinksList();
      });
    });

    list.querySelectorAll('.cfg-link-row').forEach(row => {
      row.querySelectorAll('.cfg-color-swatch').forEach(btn => {
        btn.addEventListener('click', () => {
          row.dataset.chosenColor = btn.dataset.color;
          row.querySelectorAll('.cfg-color-swatch').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
      });
    });
  }

  function addExternalLink() {
    externalLinksList.push({
      id: 'link_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      label: 'Nouveau lien',
      url: '',
      color: 'neutral',
    });
    renderLinksList();
  }

  // Bloc "filtre en cascade" affiché sous un champ Référence/RéférenceListe dans le panneau ⚙️ :
  // permet de choisir explicitement quel champ du formulaire filtre les options, et sur quelle
  // colonne de la table cible la correspondance doit se faire.
  function renderFilterBlock(c) {
    const targetTable = c.type.split(':')[1];
    const parentOptions = mergedConfig
      .filter(o => o.colId !== c.colId && !o.isFormula)
      .map(o => `<option value="${o.colId}" ${o.colId === c.filterParentColId ? 'selected' : ''}>${escapeHtml(o.label)} (${o.colId})</option>`)
      .join('');
    const targetCols = getColumnsMetaForTable(targetTable);
    const linkOptions = targetCols
      .map(tc => `<option value="${tc.colId}" ${tc.colId === c.filterLinkColId ? 'selected' : ''}>${escapeHtml(tc.label)} (${tc.colId})</option>`)
      .join('');
    return `
      <div class="cfg-filter">
        <div class="cfg-filter-label">🔗 Filtrer les options selon (facultatif) :</div>
        <select class="cfg-filter-parent">
          <option value="">— Aucun filtre —</option>
          ${parentOptions}
        </select>
        <select class="cfg-filter-link">
          <option value="">— Colonne de liaison dans ${escapeHtml(targetTable)} —</option>
          ${linkOptions}
        </select>
      </div>`;
  }

  async function saveConfig() {
    const chosenTable = document.getElementById('cfgTableSelect').value;
    const tableChanged = chosenTable !== targetTableId;

    // Titre/sous-titre personnalisés : indépendants de la table, sauvegardés dans tous les cas.
    const formTitle = document.getElementById('cfgFormTitle').value.trim();
    const formSubtitle = document.getElementById('cfgFormSubtitle').value.trim();
    await grist.setOption('formTitle', formTitle || null);
    await grist.setOption('formSubtitle', formSubtitle || null);
    currentOptions.formTitle = formTitle || null;
    currentOptions.formSubtitle = formSubtitle || null;

    // Liste de liens externes : lue depuis les lignes du panneau, puis sauvegardée.
    // On efface aussi les anciens champs fixes (kanbanUrl/ganttUrl) une fois migrés.
    const linkRows = document.querySelectorAll('#cfgLinksList .cfg-link-row');
    const newLinks = Array.from(linkRows).map(row => ({
      id: row.dataset.link,
      label: row.querySelector('.cfg-link-label').value.trim() || 'Lien',
      url: row.querySelector('.cfg-link-url').value.trim(),
      color: row.dataset.chosenColor || 'neutral',
    })).filter(l => l.url); // on ignore les lignes sans URL renseignée
    await grist.setOption('externalLinksList', newLinks);
    await grist.setOption('kanbanUrl', null);
    await grist.setOption('ganttUrl', null);
    currentOptions.externalLinksList = newLinks;
    currentOptions.kanbanUrl = null;
    currentOptions.ganttUrl = null;
    externalLinksList = newLinks;

    if (tableChanged) {
      await grist.setOption('tableId', chosenTable);
      await grist.setOption('formConfig', null);
      await grist.setOption('formSections', null);
      currentOptions.tableId = chosenTable;
      currentOptions.formConfig = null;
      currentOptions.formSections = null;
      formSections = [];
      targetTableId = chosenTable;
      await loadColumnsFor(targetTableId);
      mergedConfig = mergeConfig(tableColumns, null);
    } else {
      const rows = document.querySelectorAll('#cfgList .cfg-row[data-col]');
      const newConfig = Array.from(rows).map(row => {
        const filterParentSel = row.querySelector('.cfg-filter-parent');
        const filterLinkSel = row.querySelector('.cfg-filter-link');
        return {
          colId: row.dataset.col,
          included: row.querySelector('.cfg-included').checked,
          label: row.querySelector('.cfg-label').value.trim(),
          comment: row.querySelector('.cfg-comment').value.trim(),
          required: row.querySelector('.cfg-required').checked,
          order: parseInt(row.querySelector('.cfg-order').value, 10) || 0,
          filterParentColId: filterParentSel ? (filterParentSel.value || null) : null,
          filterLinkColId: filterLinkSel ? (filterLinkSel.value || null) : null,
          alignWithNext: row.querySelector('.cfg-align-next').checked,
        };
      });
      const sectionRows = document.querySelectorAll('#cfgList .cfg-section-row');
      const newSections = Array.from(sectionRows).map(row => ({
        id: row.dataset.section,
        title: row.querySelector('.cfg-section-title').value.trim() || 'Chapitre',
        order: parseInt(row.querySelector('.cfg-order').value, 10) || 0,
        color: row.dataset.chosenColor || SECTION_COLORS[3].value,
      }));
      await grist.setOption('formConfig', newConfig);
      await grist.setOption('formSections', newSections);
      currentOptions.formConfig = newConfig;
      currentOptions.formSections = newSections;
      formSections = newSections;
      mergedConfig = mergeConfig(tableColumns, newConfig);
    }

    updateHeaderText();
    hideConfig();
    await renderForm(mergedConfig);
  }

  // ---------- Form rendering ----------

  async function renderForm(config) {
    const formEl = document.getElementById('form');
    const excludedNote = document.getElementById('excludedNote');
    hideMsg();
    comboState = {};
    comboOptionsCache = {};

    const included = config.filter(c => c.included).sort((a, b) => a.order - b.order);

    if (!included.length) {
      formEl.innerHTML = '<div class="empty-state">Aucun champ activé. Cliquez sur ⚙️ pour en configurer.</div>';
      excludedNote.textContent = '';
      return;
    }

    formEl.innerHTML = '<div class="empty-state">Chargement…</div>';

    computeDependencies(included);
    computeFormulaPreviews(included);

    // Fusionne les champs et les chapitres dans un seul flux, trié par ordre commun,
    // pour que les titres de section s'intercalent au bon endroit dans le formulaire.
    const fieldItems = included.map(c => ({ kind: 'field', order: c.order, col: c }));
    const sectionItems = formSections.map(s => ({ kind: 'section', order: s.order, section: s }));
    const stream = [...fieldItems, ...sectionItems].sort((a, b) => a.order - b.order);

    const fieldsHtml = [];
    for (let i = 0; i < stream.length; i++) {
      const item = stream[i];
      if (item.kind === 'section') {
        const secColor = item.section.color || '#1B7A3D';
        fieldsHtml.push(`<div class="form-section" style="border-bottom-color:${secColor};"><h2 style="color:${secColor};">${escapeHtml(item.section.title)}</h2></div>`);
        continue;
      }
      // Deux champs consécutifs, alignés en deux colonnes si le premier a "alignWithNext" coché.
      const next = stream[i + 1];
      if (item.col.alignWithNext && next && next.kind === 'field') {
        const htmlA = await renderField(item.col);
        const htmlB = await renderField(next.col);
        fieldsHtml.push(`<div class="field-row-2col">${htmlA}${htmlB}</div>`);
        i++; // le champ suivant vient d'être consommé dans la paire
        continue;
      }
      fieldsHtml.push(await renderField(item.col));
    }

    formEl.innerHTML = fieldsHtml.join('') +
      '<div class="form-actions-row">' +
      '<button type="button" class="secondary" id="resetFormBtn">↺ Réinitialiser</button>' +
      '<button type="submit" class="primary">Envoyer</button>' +
      '</div>';
    formEl.onsubmit = handleSubmit;
    document.getElementById('resetFormBtn').addEventListener('click', () => { fullFormReset(formEl); hideMsg(); });

    included
      .filter(col => !col.isFormula && (col.type.startsWith('Ref:') || col.type.startsWith('RefList:') || col.type === 'Choice' || col.type === 'ChoiceList'))
      .forEach(col => setupCombobox(col, col.type.startsWith('RefList:') || col.type === 'ChoiceList'));

    // Champs formule pour lesquels un aperçu en direct est possible (recopie simple
    // depuis une référence) : on branche leur mise à jour dès que la référence change.
    included.filter(col => col.isFormula).forEach(setupFormulaPreview);

    // Les champs "parents" qui ne sont pas des combos (Texte, Numérique, Date, etc.)
    // doivent aussi déclencher le rafraîchissement de leurs champs enfants.
    Object.keys(fieldDependents).forEach(parentColId => {
      const parentField = mergedConfig.find(c => c.colId === parentColId);
      if (!parentField) return;
      const isCombo = parentField.type.startsWith('Ref:') || parentField.type.startsWith('RefList:') ||
        parentField.type === 'Choice' || parentField.type === 'ChoiceList';
      if (!isCombo) {
        const el = document.getElementById('f_' + parentColId);
        if (el) el.addEventListener('input', () => notifyDependents(parentColId));
      }
    });

    // Notes de diagnostic (champs masqués / filtres en cascade actifs) retirées de
    // l'affichage du formulaire — utiles uniquement pendant la configuration.
    excludedNote.textContent = '';
    const cascadeNote = document.getElementById('cascadeNote');
    if (cascadeNote) cascadeNote.textContent = '';
  }

  // Affiche le commentaire/aide facultatif configuré pour un champ, sous son libellé.
  function commentHtml(col) {
    return col.comment ? `<div class="field-comment">${escapeHtml(col.comment)}</div>` : '';
  }

  async function renderField(col) {
    const id = 'f_' + col.colId;
    const type = col.type;
    const reqAttr = col.required ? 'required' : '';
    const reqMark = col.required ? ' <span class="req">*</span>' : '';

    // Colonne formule : affichage informatif, non modifiable, non envoyée.
    // Si un aperçu simple est possible (recopie directe depuis une référence), le champ
    // se remplit dès que la référence est sélectionnée. Sinon, il reste vide/grisé
    // jusqu'à l'enregistrement (la valeur n'existe pas encore avant la création de la ligne).
    if (col.isFormula) {
      const hasPreview = !!formulaPreviewInfo[col.colId];
      const hint = hasPreview ? '' : "(calculé automatiquement à l'enregistrement)";
      const placeholder = hasPreview ? 'Se remplit après sélection du champ lié' : 'Rempli automatiquement après envoi';
      return `
        <div>
          <label for="${id}">${col.label}${hint ? ` <span class="formula-hint">${hint}</span>` : ''}</label>
          ${commentHtml(col)}
          <div class="formula-preview" id="${id}" data-col="${col.colId}" data-formula="1" data-placeholder="${escapeHtml(placeholder)}">
            <span class="formula-preview-placeholder">${escapeHtml(placeholder)}</span>
          </div>
        </div>`;
    }

    if (type === 'Bool') {
      return `
        <div class="checkbox-row">
          <input type="checkbox" id="${id}" data-col="${col.colId}" data-type="${type}" />
          <label for="${id}" style="margin:0;">${col.label}</label>
        </div>
        ${commentHtml(col)}`;
    }

    if (type === 'Attachments') {
      return `
        <div>
          <label for="${id}">${col.label}${reqMark}</label>
          ${commentHtml(col)}
          <input type="file" id="${id}" data-col="${col.colId}" data-type="${type}" multiple ${reqAttr} />
        </div>`;
    }

    if (type.startsWith('Ref:') || type.startsWith('RefList:')) {
      const options = await getRefOptions(col);
      comboOptionsCache[col.colId] = options;
      const isList = type.startsWith('RefList:');
      return `
        <div>
          <label for="${id}">${col.label}${reqMark}</label>
          ${commentHtml(col)}
          <div class="combo" data-col="${col.colId}">
            <input type="text" class="combo-input" id="${id}" data-col="${col.colId}"
              placeholder="Rechercher…" autocomplete="off" />
            <input type="hidden" class="combo-proxy" data-col="${col.colId}" ${reqAttr} />
            <div class="combo-list" data-col="${col.colId}"></div>
          </div>
          ${isList ? `<div class="combo-tags" data-col="${col.colId}"></div>` : ''}
        </div>`;
    }

    if (type === 'Choice' || type === 'ChoiceList') {
      let choices = [];
      try {
        const opts = JSON.parse(col.widgetOptions || '{}');
        choices = opts.choices || [];
      } catch (e) {}
      const options = choices
        .filter(c => c !== null && c !== undefined && String(c).trim() !== '')
        .map(c => ({ value: c, label: c }));
      comboOptionsCache[col.colId] = options;
      const isList = type === 'ChoiceList';
      return `
        <div>
          <label for="${id}">${col.label}${reqMark}</label>
          ${commentHtml(col)}
          <div class="combo" data-col="${col.colId}">
            <input type="text" class="combo-input" id="${id}" data-col="${col.colId}"
              placeholder="Rechercher…" autocomplete="off" />
            <input type="hidden" class="combo-proxy" data-col="${col.colId}" ${reqAttr} />
            <div class="combo-list" data-col="${col.colId}"></div>
          </div>
          ${isList ? `<div class="combo-tags" data-col="${col.colId}"></div>` : ''}
        </div>`;
    }

    let inputType = 'text';
    let step = null;
    if (type === 'Numeric') { inputType = 'number'; step = 'any'; }
    else if (type === 'Int') { inputType = 'number'; step = '1'; }
    else if (type === 'Date') inputType = 'date';
    else if (type.startsWith('DateTime')) inputType = 'datetime-local';

    return `
      <div>
        <label for="${id}">${col.label}${reqMark}</label>
        ${commentHtml(col)}
        <input type="${inputType}" id="${id}" data-col="${col.colId}" data-type="${type}"
          ${step ? `step="${step}"` : ''} ${reqAttr} />
      </div>`;
  }

  async function getRefOptions(col) {
    const targetTable = col.type.split(':')[1];
    if (!refOptionsCache[targetTable]) {
      refOptionsCache[targetTable] = await grist.docApi.fetchTable(targetTable);
    }
    const data = refOptionsCache[targetTable];

    let displayColId = null;
    if (col.visibleCol && allDocColumns) {
      const idx = allDocColumns.id.indexOf(col.visibleCol);
      if (idx !== -1) displayColId = allDocColumns.colId[idx];
    }

    // Si ce champ dépend d'un autre champ du formulaire (cascade), on récupère aussi
    // la valeur brute de la colonne de liaison pour chaque ligne, afin de pouvoir filtrer.
    const dep = dependencyInfo[col.colId];
    const linkColId = dep ? dep.linkColId : null;

    const options = [];
    for (let i = 0; i < data.id.length; i++) {
      let label;
      if (displayColId) {
        const raw = data[displayColId][i];
        // Cellule vide dans la colonne affichée -> on exclut cette ligne des options
        if (raw === null || raw === undefined || String(raw).trim() === '') continue;
        label = String(raw);
      } else {
        // Pas de "Colonne à afficher" définie dans Grist : on garde l'identifiant comme repli
        label = `#${data.id[i]}`;
      }
      const opt = { value: data.id[i], label };
      if (linkColId && data[linkColId]) {
        opt.filterRaw = data[linkColId][i];
      }
      options.push(opt);
    }
    options.sort((a, b) => a.label.localeCompare(b.label, 'fr', { sensitivity: 'base' }));
    return options;
  }

  // Applique le format d'affichage Grist (pourcentage, nombre de décimales) à une valeur
  // numérique brute, en se basant sur les options de la colonne formule elle-même
  // (c'est elle qui porte le format d'affichage, ex. "70%" au lieu de "0.7").
  function formatPreviewValue(raw, type, widgetOptionsStr) {
    if (raw === null || raw === undefined || raw === '') return '';
    if (type === 'Numeric' || type === 'Int') {
      const num = Number(raw);
      if (!Number.isNaN(num)) {
        let opts = {};
        try { opts = JSON.parse(widgetOptionsStr || '{}'); } catch (e) {}
        // Grist stocke le mode d'affichage numérique sous la clé "numMode" (ex. "percent",
        // "currency", "scientific"). On vérifie aussi "numberFormat" par sécurité au cas où.
        const mode = opts.numMode || opts.numberFormat;
        if (mode === 'percent') {
          const decimals = typeof opts.decimals === 'number' ? opts.decimals : 0;
          return (num * 100).toFixed(decimals) + '%';
        }
        if (typeof opts.decimals === 'number') return num.toFixed(opts.decimals);
      }
    }
    return String(raw);
  }

  // Formate une date/heure brute (timestamp Unix en secondes, tel que renvoyé par Grist)
  // au format DD/MM/YY. Pour les DateTime, l'heure (HH:MM) est ajoutée à la suite.
  // Les dates (sans heure) sont interprétées en UTC pour éviter tout décalage de fuseau
  // horaire qui ferait basculer sur le jour précédent/suivant.
  function formatDatePreviewValue(raw, type) {
    if (raw === null || raw === undefined || raw === '') return '';
    const num = Number(raw);
    if (Number.isNaN(num)) return String(raw);
    const isDateTime = type.startsWith('DateTime');
    const d = new Date(num * 1000);
    const dd = String(isDateTime ? d.getDate() : d.getUTCDate()).padStart(2, '0');
    const mm = String((isDateTime ? d.getMonth() : d.getUTCMonth()) + 1).padStart(2, '0');
    const yy = String(isDateTime ? d.getFullYear() : d.getUTCFullYear()).slice(-2);
    let result = `${dd}/${mm}/${yy}`;
    if (isDateTime) {
      const hh = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      result += ` ${hh}:${min}`;
    }
    return result;
  }

  // Construit le HTML affiché dans le bloc d'aperçu d'un champ formule. Gère deux cas :
  // - Une liste Grist native (RefList/ChoiceList), représentée en interne par
  //   ["L", élément1, élément2, ...] : on retire ce marqueur "L" avant affichage.
  // - Un texte "à plat" contenant plusieurs éléments séparés par des virgules
  //   (ex. "Projet 1, Projet 2, Projet 3").
  // Dans les deux cas, si plusieurs éléments sont trouvés, chacun s'affiche sur sa
  // propre ligne au lieu d'un texte continu, pour rester lisible.
  function renderFormulaPreviewHtml(raw, type, widgetOptionsStr, placeholder) {
    if (raw === null || raw === undefined || raw === '') {
      return `<span class="formula-preview-placeholder">${escapeHtml(placeholder)}</span>`;
    }
    if (type === 'Numeric' || type === 'Int') {
      return escapeHtml(formatPreviewValue(raw, type, widgetOptionsStr));
    }
    if (type === 'Date' || type.startsWith('DateTime')) {
      return escapeHtml(formatDatePreviewValue(raw, type));
    }

    let items;
    if (Array.isArray(raw)) {
      // Marqueur de liste Grist : ["L", v1, v2, ...] -> on retire le "L" de tête.
      const values = (raw[0] === 'L') ? raw.slice(1) : raw;
      items = values.map(v => String(v).trim()).filter(v => v !== '');
    } else {
      items = String(raw).split(',').map(s => s.trim()).filter(s => s !== '');
    }

    if (items.length > 1) {
      return '<ul class="formula-preview-list">' + items.map(it => `<li>${escapeHtml(it)}</li>`).join('') + '</ul>';
    }
    if (items.length === 1) return escapeHtml(items[0]);
    return `<span class="formula-preview-placeholder">${escapeHtml(placeholder)}</span>`;
  }

  // Branche l'aperçu en direct d'un champ formule simple ($Ref.SousChamp) : dès que le
  // champ Référence dont il dépend change, on va chercher la valeur du sous-champ
  // directement dans les données déjà chargées de la table référencée (refOptionsCache),
  // sans réinterpréter la formule elle-même.
  // ---------- Pièces jointes en lecture seule (champs formule de type Attachments) ----------

  let attachmentsMetaCache = null; // métadonnées (_grist_Attachments) : nom de fichier, type MIME
  let downloadTokenInfo = null;    // token d'accès réutilisé pour construire les liens de téléchargement

  async function getAttachmentsMeta() {
    if (!attachmentsMetaCache) {
      attachmentsMetaCache = await grist.docApi.fetchTable('_grist_Attachments');
    }
    return attachmentsMetaCache;
  }

  async function getDownloadTokenInfo() {
    if (!downloadTokenInfo) {
      downloadTokenInfo = await grist.docApi.getAccessToken({ readOnly: true });
    }
    return downloadTokenInfo;
  }

  // Construit l'affichage (vignette pour les images, sinon lien) pour une valeur brute
  // de colonne Pièce(s) jointe(s) — gère le marqueur de liste Grist ["L", id1, id2, ...].
  async function renderAttachmentLinks(raw) {
    const ids = Array.isArray(raw) ? (raw[0] === 'L' ? raw.slice(1) : raw) : (raw ? [raw] : []);
    const validIds = ids.filter(id => typeof id === 'number' && id > 0);
    if (!validIds.length) return '';

    const meta = await getAttachmentsMeta();
    const tok = await getDownloadTokenInfo();

    return '<div class="attachment-list">' + validIds.map(id => {
      const idx = meta.id.indexOf(id);
      const fileName = idx !== -1 ? String(meta.fileName[idx]) : ('Fichier #' + id);
      const fileType = idx !== -1 ? String(meta.fileType[idx] || '') : '';
      const url = `${tok.baseUrl}/attachments/${id}/download?auth=${encodeURIComponent(tok.token)}`;
      const isImage = fileType.startsWith('image/');
      return isImage
        ? `<a class="attachment-item attachment-image" href="${url}" target="_blank" rel="noopener">
             <img src="${url}" alt="${escapeHtml(fileName)}" />
             <span>${escapeHtml(fileName)}</span>
           </a>`
        : `<a class="attachment-item" href="${url}" target="_blank" rel="noopener">📎 ${escapeHtml(fileName)}</a>`;
    }).join('') + '</div>';
  }

  function setupFormulaPreview(col) {
    const info = formulaPreviewInfo[col.colId];
    if (!info) return;
    const el = document.getElementById('f_' + col.colId);
    if (!el) return;
    const placeholder = el.getAttribute('data-placeholder') || '';

    formulaCallbacks[col.colId] = async () => {
      const refValue = getFieldRawValue(info.refColId);
      const data = refOptionsCache[info.targetTable];
      if (refValue === null || refValue === undefined || refValue === '' || !data || !data[info.subColId]) {
        el.innerHTML = `<span class="formula-preview-placeholder">${escapeHtml(placeholder)}</span>`;
        return;
      }
      const targetId = typeof refValue === 'string' ? parseInt(refValue, 10) : refValue;
      const idx = data.id.indexOf(targetId);
      const raw = idx !== -1 ? data[info.subColId][idx] : null;

      if (col.type === 'Attachments') {
        try {
          const html = await renderAttachmentLinks(raw);
          el.innerHTML = html || `<span class="formula-preview-placeholder">${escapeHtml(placeholder)}</span>`;
        } catch (err) {
          console.error(err);
          el.innerHTML = '<span class="formula-preview-placeholder">Erreur de chargement de la pièce jointe</span>';
        }
        return;
      }

      el.innerHTML = renderFormulaPreviewHtml(raw, col.type, col.widgetOptions, placeholder);
    };

    formulaCallbacks[col.colId](); // état initial (généralement vide tant que rien n'est sélectionné)
  }

  function setupCombobox(col, isList) {
    const colId = col.colId;
    const options = comboOptionsCache[colId] || [];
    const dep = dependencyInfo[colId];
    const wrapper = document.querySelector(`.combo[data-col="${colId}"]`);
    if (!wrapper) return;
    const input = wrapper.querySelector('.combo-input');
    const listEl = wrapper.querySelector('.combo-list');
    const proxy = wrapper.querySelector('.combo-proxy');
    const tagsEl = isList ? document.querySelector(`.combo-tags[data-col="${colId}"]`) : null;

    comboState[colId] = isList ? [] : null;

    // Sous-ensemble des options actuellement disponibles compte tenu du champ parent
    // (si le parent n'a pas encore de valeur, on montre tout, sans filtrer).
    function getAvailableOptions() {
      if (!dep) return options;
      const parentValue = getFieldRawValue(dep.parentColId);
      if (parentValue === null || parentValue === undefined || parentValue === '') return options;
      return options.filter(o => o.filterRaw !== undefined && o.filterRaw !== null && String(o.filterRaw) === String(parentValue));
    }

    function isSelected(opt) {
      if (isList) return comboState[colId].some(o => String(o.value) === String(opt.value));
      return comboState[colId] && String(comboState[colId].value) === String(opt.value);
    }

    function updateProxy() {
      if (isList) {
        proxy.value = comboState[colId].length ? 'x' : '';
      } else {
        proxy.value = comboState[colId] ? String(comboState[colId].value) : '';
      }
    }

    function renderTags() {
      if (!isList) return;
      tagsEl.innerHTML = comboState[colId].map(o => `
        <span class="combo-tag">${escapeHtml(o.label)} <button type="button" data-remove="${o.value}">✕</button></span>
      `).join('');
      tagsEl.querySelectorAll('button[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.getAttribute('data-remove');
          comboState[colId] = comboState[colId].filter(o => String(o.value) !== val);
          renderTags();
          updateProxy();
          notifyDependents(colId);
        });
      });
    }

    function renderList(query) {
      const avail = getAvailableOptions();
      const q = query.trim().toLowerCase();
      const filtered = avail.filter(o =>
        o.label.toLowerCase().includes(q) && !(isList && isSelected(o))
      );
      if (!filtered.length) {
        const parentValue = dep ? getFieldRawValue(dep.parentColId) : null;
        if (dep && parentValue !== null && parentValue !== undefined && parentValue !== '') {
          const withLink = options.filter(o => o.filterRaw !== undefined && o.filterRaw !== null).length;
          listEl.innerHTML = `<div class="combo-empty">Aucune ligne liée à ce choix.<br>Diagnostic : valeur comparée = "${escapeHtml(String(parentValue))}" · ${withLink} ligne(s) sur ${options.length} ont une colonne de liaison renseignée dans ${escapeHtml(dep.targetTable)}.</div>`;
        } else {
          listEl.innerHTML = '<div class="combo-empty">Aucun résultat</div>';
        }
      } else {
        listEl.innerHTML = filtered.map(o =>
          `<div class="combo-option" data-value="${o.value}">${escapeHtml(o.label)}</div>`
        ).join('');
        listEl.querySelectorAll('.combo-option').forEach(el => {
          el.addEventListener('mousedown', (e) => {
            e.preventDefault(); // garde le focus pour que le clic s'enregistre (utile aussi au tactile)
            const val = el.getAttribute('data-value');
            const opt = avail.find(o => String(o.value) === val);
            if (!opt) return;
            if (isList) {
              if (!isSelected(opt)) comboState[colId].push(opt);
              input.value = '';
              renderTags();
              renderList('');
            } else {
              comboState[colId] = opt;
              input.value = opt.label;
              listEl.classList.remove('open');
            }
            updateProxy();
            notifyDependents(colId);
          });
        });
      }
      listEl.classList.add('open');
    }

    input.addEventListener('focus', () => renderList(isList ? '' : (comboState[colId] ? '' : input.value)));
    input.addEventListener('input', () => {
      if (!isList && comboState[colId]) {
        comboState[colId] = null;
        updateProxy();
        notifyDependents(colId);
      }
      renderList(input.value);
    });

    // Si ce champ dépend d'un parent, on l'enregistre pour être rafraîchi/invalidé
    // dès que la valeur du parent change.
    if (dep) {
      dependencyCallbacks[colId] = () => {
        const avail = getAvailableOptions();
        if (isList) {
          const before = comboState[colId].length;
          comboState[colId] = comboState[colId].filter(o => avail.some(a => String(a.value) === String(o.value)));
          if (comboState[colId].length !== before) renderTags();
        } else if (comboState[colId] && !avail.some(o => String(o.value) === String(comboState[colId].value))) {
          comboState[colId] = null;
          input.value = '';
        }
        updateProxy();
        if (listEl.classList.contains('open')) renderList(input.value);
        notifyDependents(colId); // propage en cascade si ce champ a lui-même des enfants
      };
    }

    updateProxy();
    renderTags();
  }

  function resetAllCombos() {
    mergedConfig
      .filter(c => c.included && !c.isFormula && (c.type.startsWith('Ref:') || c.type.startsWith('RefList:') || c.type === 'Choice' || c.type === 'ChoiceList'))
      .forEach(col => {
        const isList = col.type.startsWith('RefList:') || col.type === 'ChoiceList';
        comboState[col.colId] = isList ? [] : null;
        const wrapper = document.querySelector(`.combo[data-col="${col.colId}"]`);
        if (wrapper) {
          wrapper.querySelector('.combo-input').value = '';
          wrapper.querySelector('.combo-proxy').value = '';
        }
        if (isList) {
          const tagsEl = document.querySelector(`.combo-tags[data-col="${col.colId}"]`);
          if (tagsEl) tagsEl.innerHTML = '';
        }
      });
  }

  // Réinitialisation complète du formulaire : champs natifs, combobox (Ref/Choice),
  // et rafraîchissement des champs en cascade / aperçus de formule qui en dépendaient.
  function fullFormReset(formEl) {
    if (formEl) formEl.reset();
    resetAllCombos();
    // Propage la remise à zéro aux champs dépendants (cascade + aperçus de formule),
    // pour qu'ils redeviennent vides plutôt que de garder une ancienne valeur affichée.
    mergedConfig
      .filter(c => c.included && !c.isFormula && (c.type.startsWith('Ref:') || c.type.startsWith('RefList:') || c.type === 'Choice' || c.type === 'ChoiceList'))
      .forEach(col => notifyDependents(col.colId));
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ---------- Submit ----------

  async function uploadFiles(fileList) {
    if (!fileList || !fileList.length) return null;
    const tokenInfo = await grist.docApi.getAccessToken({ readOnly: false });
    const formData = new FormData();
    for (const file of fileList) formData.append('upload', file, file.name);
    const resp = await fetch(`${tokenInfo.baseUrl}/attachments?auth=${tokenInfo.token}`, {
      method: 'POST',
      body: formData,
    });
    if (!resp.ok) throw new Error('Échec de l’envoi de la pièce jointe (' + resp.status + ')');
    const data = await resp.json();
    const list = Array.isArray(data) ? data : (data.attachments || []);
    const ids = list.map(item => (item && typeof item === 'object') ? item.id : item);
    return ids.length ? ['L', ...ids] : null;
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    hideMsg();

    try {
      // Les colonnes formule sont exclues de l'envoi : Grist les calcule seul.
      const included = mergedConfig.filter(c => c.included && !c.isFormula);
      const fields = {};

      for (const col of included) {
        const el = document.getElementById('f_' + col.colId);
        const type = col.type;
        let value;

        if (type === 'Bool') {
          fields[col.colId] = el.checked;
          continue;
        }

        if (type === 'Attachments') {
          value = await uploadFiles(el.files);
          if (value !== null) fields[col.colId] = value;
          continue;
        }

        if (type === 'ChoiceList') {
          const selected = comboState[col.colId] || [];
          if (!selected.length) continue;
          fields[col.colId] = ['L', ...selected.map(o => o.value)];
          continue;
        }

        if (type === 'Choice') {
          const selected = comboState[col.colId];
          if (!selected) continue;
          fields[col.colId] = selected.value;
          continue;
        }

        if (type.startsWith('RefList:')) {
          const selected = comboState[col.colId] || [];
          if (!selected.length) continue;
          fields[col.colId] = ['L', ...selected.map(o => parseInt(o.value, 10))];
          continue;
        }

        if (type.startsWith('Ref:')) {
          const selected = comboState[col.colId];
          if (!selected) continue;
          fields[col.colId] = parseInt(selected.value, 10);
          continue;
        }

        if (type === 'Numeric') {
          value = el.value === '' ? null : parseFloat(el.value);
        } else if (type === 'Int') {
          value = el.value === '' ? null : parseInt(el.value, 10);
        } else if (type === 'Date') {
          value = el.value ? Math.floor(new Date(el.value + 'T00:00:00Z').getTime() / 1000) : null;
        } else if (type.startsWith('DateTime')) {
          value = el.value ? Math.floor(new Date(el.value).getTime() / 1000) : null;
        } else {
          value = el.value === '' ? null : el.value;
        }

        if (value !== null) fields[col.colId] = value;
      }

      const table = grist.getTable(targetTableId);
      await table.create({ fields });

      showMsg('success', '✓ Enregistrement ajouté avec succès.');
      fullFormReset(e.target);
    } catch (err) {
      console.error(err);
      showMsg('error', 'Erreur lors de l’envoi : ' + (err.message || err));
    } finally {
      btn.disabled = false;
    }
  }

  function showMsg(type, text) {
    const msg = document.getElementById('msg');
    msg.className = 'msg ' + type;
    msg.textContent = text;
  }
  function hideMsg() {
    const msg = document.getElementById('msg');
    msg.className = 'msg';
    msg.textContent = '';
  }
</script>
</body>
</html>
